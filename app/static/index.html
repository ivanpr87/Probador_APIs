<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Sentinel — AI API Quality Analyzer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🛡️</div>
      <div class="brand-name">API <span>Sentinel</span></div>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" data-view="run-test">
        <span class="nav-icon">🧪</span>
        <span>Run Test</span>
      </a>
      <a class="nav-item" data-view="results">
        <span class="nav-icon">📊</span>
        <span>Results</span>
        <span class="nav-badge" id="results-badge" style="display:none">●</span>
      </a>
      <a class="nav-item" data-view="history">
        <span class="nav-icon">🕘</span>
        <span>History</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span>API Sentinel v1.0</span>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-title" id="topbar-title">Run Test</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </header>

    <!-- VIEWS -->
    <div class="view-content">

      <!-- ── VIEW: RUN TEST ── -->
      <section class="view" id="view-run-test">
        <div class="view-inner">
          <div class="card">
            <div class="card-header">
              <div class="card-title">Endpoint Configuration</div>
              <div class="card-desc">Configure the API endpoint you want to analyze</div>
            </div>
            <div class="card-body">

              <div class="two-col" style="margin-bottom:16px">
                <div class="field">
                  <label for="url">Endpoint URL</label>
                  <input id="url" type="url" placeholder="https://api.example.com/users" />
                </div>
                <div class="field" style="max-width:160px">
                  <label for="method">HTTP Method</label>
                  <select id="method">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                  </select>
                </div>
              </div>

              <div class="two-col" style="margin-bottom:16px">
                <div class="field">
                  <label for="payload">
                    Request Payload
                    <span class="label-hint">(JSON, for POST)</span>
                  </label>
                  <textarea id="payload" rows="6" placeholder='{"username": "johndoe", "email": "john@example.com"}'></textarea>
                </div>
                <div class="field">
                  <label for="headers">
                    Auth Headers
                    <span class="label-hint">(JSON, optional)</span>
                  </label>
                  <textarea id="headers" rows="6" placeholder='{"Authorization": "Bearer your-token-here"}'></textarea>
                </div>
              </div>

              <div class="error-banner" id="error-banner" style="display:none"></div>

              <div class="form-actions">
                <button class="btn-primary" id="btn-run">
                  <span class="spinner" id="spinner"></span>
                  <span id="btn-text">▶ Run AI Test</span>
                </button>
              </div>

            </div>
          </div>
        </div>
      </section>

      <!-- ── VIEW: RESULTS ── -->
      <section class="view" id="view-results">
        <div class="view-inner" id="results-content">
          <div class="empty-view">
            <div class="empty-icon">📊</div>
            <div class="empty-title">No results yet</div>
            <div class="empty-desc">Run a test to see your analysis here</div>
            <button class="btn-secondary" id="go-run-test">Go to Run Test</button>
          </div>
        </div>
      </section>

      <!-- ── VIEW: HISTORY ── -->
      <section class="view" id="view-history">
        <div class="view-inner" id="history-content">
          <div class="empty-view">
            <div class="empty-icon">🕘</div>
            <div class="empty-title">No history yet</div>
            <div class="empty-desc">Tests you run will appear here automatically</div>
          </div>
        </div>
      </section>

    </div><!-- /view-content -->
  </div><!-- /main -->
</div><!-- /layout -->

<!-- ── DETAIL PANEL (history slide-in) ── -->
<div class="detail-overlay" id="detail-overlay"></div>
<aside class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <h3>Test Details</h3>
    <button class="btn-close" id="btn-close-detail">×</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</aside>

<script src="app.js"></script>
</body>
</html>
